<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>The Forest Gym | 退会届フォーム</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  background:#0b0b0b;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif;
  line-height:1.6;
  padding:24px 14px 60px;
}

.container{
  max-width:520px;
  margin:0 auto;
}

.subtitle{
  text-align:center;
  font-size:12px;
  letter-spacing:2px;
  color:#999;
  margin-bottom:34px;
}

.section{
  background:#151515;
  border:1px solid #242424;
  border-radius:18px;
  padding:22px;
  margin-bottom:18px;
}

.section-title{
  font-size:18px;
  font-weight:700;
  margin-bottom:18px;
}

.section-title small{
  display:block;
  font-size:11px;
  color:#888;
  margin-top:2px;
  letter-spacing:1px;
}

.row{
  display:flex;
  gap:10px;
}

.row .field{
  flex:1;
}

.field{
  margin-bottom:16px;
}

label{
  display:block;
  font-size:13px;
  margin-bottom:7px;
  color:#d7d7d7;
}

input,
textarea,
select{
  width:100%;
  background:#0d0d0d;
  border:1px solid #333;
  border-radius:12px;
  color:#fff;
  padding:14px;
  font-size:16px;
}

input:focus,
textarea:focus,
select:focus{
  outline:none;
  border-color:#00c853;
}

.notice{
  font-size:12px;
  color:#aaa;
  margin-top:12px;
  line-height:1.7;
}

.checkbox-group{
  display:flex;
  flex-direction:column;
  gap:16px;
}

.checkbox-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
}

.checkbox-item input{
  width:22px;
  height:22px;
  margin-top:2px;
  accent-color:#00c853;
  flex-shrink:0;
}

.checkbox-item label{
  margin:0;
  font-size:14px;
  line-height:1.8;
  color:#f0f0f0;
}

.highlight{
  color:#ffd54f;
}

.submit-btn{
  width:100%;
  border:none;
  border-radius:16px;
  padding:18px;
  background:linear-gradient(135deg,#00c853,#00e676);
  color:#000;
  font-size:18px;
  font-weight:800;
  cursor:pointer;
  margin-top:8px;
}

.submit-sub{
  display:block;
  font-size:11px;
  letter-spacing:1.5px;
  margin-top:4px;
}

textarea{
  min-height:120px;
  resize:vertical;
}

.hidden{
  display:none;
}

</style>
</head>

<body>

<div class="container">

<div style="text-align:center;margin-bottom:18px;">
  <img
    src="logo(5).png"
    alt="The Forest Gym"
    style="
      width:260px;
      max-width:85%;
      height:auto;
      display:inline-block;
    "
  >
</div>

<h1 style="
  text-align:center;
  font-size:30px;
  margin-bottom:4px;
  font-weight:700;
">
  退会届フォーム
</h1>

<div class="subtitle">
  WITHDRAWAL REQUEST
</div>

<form>

<div class="section">

<div class="section-title">
会員情報
<small>MEMBER INFORMATION</small>
</div>

<div class="row">
  <div class="field">
    <label>姓</label>
    <input type="text" placeholder="山田">
  </div>

  <div class="field">
    <label>名</label>
    <input type="text" placeholder="太郎">
  </div>
</div>

<div class="row">
  <div class="field">
    <label>姓（フリガナ）</label>
    <input type="text" placeholder="ヤマダ">
  </div>

  <div class="field">
    <label>名（フリガナ）</label>
    <input type="text" placeholder="タロウ">
  </div>
</div>

<div class="field">
  <label>会員番号</label>
  <input type="text" placeholder="123456">
</div>

<div class="field">
  <label>メールアドレス</label>
  <input type="email" placeholder="example@gmail.com">
</div>

<div class="field">
  <label>電話番号</label>
  <input type="tel" placeholder="09012345678">
</div>

</div>

<div class="section">

<div class="section-title">
退会期日
<small>WITHDRAWAL DATE</small>
</div>

<div class="field">
<select>
  <option>2026年6月末</option>
  <option>2026年7月末</option>
</select>
</div>

<div class="notice">
※ 毎月9日20:00以降のお手続きは翌月扱いとなります。
</div>

</div>

<div class="section">

<div class="section-title">
退会理由
<small>REASON FOR WITHDRAWAL</small>
</div>

<div class="field">
<select id="reasonSelect">
  <option>転居（予定含む）のため</option>
  <option>利用機会が少ないため</option>
  <option>目標達成したため</option>
  <option>その他</option>
</select>
</div>

<div class="field hidden" id="otherField" style="margin-top:16px;">
  <label>理由、ご意見等自由にご記載ください。</label>
  <textarea placeholder="ご自由にご記載ください"></textarea>
</div>

</div>

<div class="section">

<div class="section-title">
確認事項
<small>CONFIRMATION</small>
</div>

<div class="checkbox-group">

<div class="checkbox-item">
  <input type="checkbox">
  <label>
    継続条件付きキャンペーンでのご入会／パーソナルトレーニング購入で継続条件が満たない場合、
    <span class="highlight">
    キャンペーン価格は適用されず通常価格との差額の精算が必要
    </span>
    となります。
  </label>
</div>

<div class="checkbox-item">
  <input type="checkbox">
  <label>
    記載の退会期日が、入会時に説明を受けた退会できない期間の場合、
    <span class="highlight">
    退会可能な最短期日をもって退会
    </span>
    となります。
  </label>
</div>

<div class="checkbox-item">
  <input type="checkbox">
  <label>
    在籍中・退会後に虚偽や一方的な情報を拡散した場合、当ジムは必要に応じて
    <span class="highlight">
    法的措置を含む対応
    </span>
    を行う可能性があることを承知します。
  </label>
</div>

</div>

</div>

<button type="button" class="submit-btn">
退会届を送信する
<span class="submit-sub">
SUBMIT WITHDRAWAL REQUEST
</span>
</button>

</form>

</div>

<script>

const reasonSelect = document.getElementById("reasonSelect");
const otherField = document.getElementById("otherField");

reasonSelect.addEventListener("change", () => {

  if(reasonSelect.value === "その他"){

    otherField.classList.remove("hidden");

  }else{

    otherField.classList.add("hidden");

  }

});

</script>

</body>
</html>
